name: CI

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:
  workflow_call:
    secrets:
      HANA_DB_ADDRESS:
        required: true
      HANA_DB_PORT:
        required: true
      HANA_DB_USER:
        required: true
      HANA_DB_PASSWORD:
        required: true
      HANA_DB_EMBEDDING_MODEL_ID:
        required: true 
      HANA_DB_EMBEDDING_REMOTE_MODEL_ID:
        required: true
      HANA_DB_EMBEDDING_REMOTE_SOURCE:
        required: true
      HANA_DB_RERANK_MODEL_ID:
        required: true

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.4"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # The 'env:' block at the job level makes these variables available in all steps.
    env:
      HANA_DB_ADDRESS: ${{ secrets.HANA_DB_ADDRESS }}
      HANA_DB_PORT: ${{ secrets.HANA_DB_PORT }}
      HANA_DB_USER: ${{ secrets.HANA_DB_USER }}
      HANA_DB_PASSWORD: ${{ secrets.HANA_DB_PASSWORD }}
      HANA_DB_EMBEDDING_MODEL_ID: ${{ secrets.HANA_DB_EMBEDDING_MODEL_ID }}
      HANA_DB_EMBEDDING_REMOTE_MODEL_ID: ${{ secrets.HANA_DB_EMBEDDING_REMOTE_MODEL_ID }}
      HANA_DB_EMBEDDING_REMOTE_SOURCE: ${{ secrets.HANA_DB_EMBEDDING_REMOTE_SOURCE }}
      HANA_DB_RERANK_MODEL_ID: ${{ secrets.HANA_DB_RERANK_MODEL_ID }}


    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python + Poetry ${{ env.PYTHON_VERSION }}
        uses: "./.github/actions/poetry_setup"
        id: setup-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          poetry-version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --with test

      - name: Run Unit Tests
        id: unit_tests
        # unit tests are run with the --disable-socket flag to prevent network calls
        run: poetry run pytest --disable-socket --allow-unix-socket tests/unit_tests/

      - name: Run Integration Tests
        id: integration_tests
        run: poetry run pytest tests/integration_tests/
